<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <section id="mainScreen" class="screen active">
      <header class="hero">
        <div class="hero-top">
          <h1>TimeFlow</h1>
          <div class="hero-actions">
            <button id="toggleDisplayMode" class="mode-button" type="button" title="Alternar formato de tempo">1,5h</button>
            <button id="openSettings" class="settings-button" type="button">⚙️</button>
          </div>
        </div>
        <p>Monitore o tempo que gastou em cada atividade</p>
      </header>

      <section class="create-area">
        <input type="text" id="name" placeholder="Nome do cronometro">
        <button id="create">Criar</button>
      </section>

      <section class="search-area">
        <input type="text" id="search" placeholder="Buscar cronometro...">
      </section>

      <section class="timers-wrap">
        <h2>Cronometros</h2>
        <div id="timers"></div>
      </section>
    </section>

    <section id="settingsScreen" class="screen hidden">
      <header class="hero">
        <div class="hero-top">
          <h1>Configurações</h1>
          <button id="backToMain" class="settings-button" type="button" aria-label="Voltar para tela principal" title="Início">🏠</button>
        </div>
        <p>Defina o comportamento automático dos cronometros</p>
      </header>

      <section class="auto-group-area">
        <label for="autoGroupTimers" class="checkbox-label">
          <input type="checkbox" id="autoGroupTimers">
          Iniciar cronometro automaticamente ao criar grupo de abas
        </label>
      </section>

      <section class="theme-area">
        <button id="toggleTheme" class="theme-button" type="button" title="Ativar modo escuro" aria-label="Alternar tema">
          <span class="theme-main">Tema</span>
          <span class="theme-meta">
            <span id="themeModeLabel" class="theme-state">Escuro</span>
            <span id="themeIcon" class="theme-icon">🌙</span>
          </span>
        </button>
      </section>

      <section class="backup-area">
        <button id="exportDump" class="secondary-action" type="button">Exportar backup</button>
        <button id="importDump" class="secondary-action" type="button">Importar backup</button>
        <input type="file" id="importDumpInput" accept="application/json,.json" class="hidden-file-input">
      </section>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
