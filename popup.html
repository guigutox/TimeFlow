<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <section id="mainScreen" class="screen active">
      <header class="hero">
        <div class="hero-top">
          <h1>TimeFlow</h1>
          <div class="hero-actions">
            <button id="toggleDisplayMode" class="mode-button" type="button" title="Alternar formato de tempo">1,5h</button>
            <button id="openSettings" class="settings-button" type="button">⚙️</button>
          </div>
        </div>
        <p>Monitore o tempo que gastou em cada atividade</p>
      </header>

      <section class="create-area">
        <input type="text" id="name" placeholder="Nome do cronometro">
        <button id="create">Criar</button>
      </section>

      <section class="search-area">
        <input type="text" id="search" placeholder="Buscar cronometro...">
      </section>

      <section class="timers-wrap">
        <div class="timers-header">
          <h2>Cronometros</h2>
          <button id="toggleSortOrder" class="sort-button" type="button" title="Ordenar: mais antigos primeiro">Antigos</button>
        </div>
        <div id="timers"></div>
      </section>
    </section>

    <section id="settingsScreen" class="screen hidden">
      <header class="hero">
        <div class="hero-top">
          <h1>Configurações</h1>
          <button id="backToMain" class="settings-button" type="button" aria-label="Voltar para tela principal" title="Início">🏠</button>
        </div>
        <p>Defina o comportamento automático dos cronometros</p>
      </header>

      <section class="auto-group-area">
        <label for="autoGroupTimers" class="checkbox-label">
          <input type="checkbox" id="autoGroupTimers">
          Iniciar cronometro automaticamente ao criar grupo de abas
        </label>
      </section>

      <section class="floating-button-area">
        <label for="floatingButtonEnabled" class="checkbox-label">
          <input type="checkbox" id="floatingButtonEnabled">
          Exibir botao flutuante para agrupar a aba atual
        </label>
      </section>

      <section class="shortcuts-area">
        <h2>Atalhos de texto global</h2>
        <p class="shortcuts-help">Exemplo: ao digitar /inicio ele vira o texto salvo.</p>
        <div class="shortcuts-form">
          <input type="text" id="shortcutKey" placeholder="/inicio" maxlength="40">
          <textarea id="shortcutValue" rows="3" placeholder="Texto que sera inserido"></textarea>
          <button id="addShortcut" class="secondary-action" type="button">Salvar atalho</button>
        </div>
        <div id="shortcutsList" class="shortcuts-list"></div>
      </section>

      <section class="theme-area">
        <button id="toggleTheme" class="theme-button" type="button" title="Ativar modo escuro" aria-label="Alternar tema">
          <span class="theme-main">Tema</span>
          <span class="theme-meta">
            <span id="themeModeLabel" class="theme-state">Escuro</span>
            <span id="themeIcon" class="theme-icon">🌙</span>
          </span>
        </button>
      </section>

      <section class="backup-area">
        <button id="exportDump" class="secondary-action" type="button">Exportar backup</button>
        <button id="importDump" class="secondary-action" type="button">Importar backup</button>
        <input type="file" id="importDumpInput" accept="application/json,.json" class="hidden-file-input">
      </section>

      <p class="settings-credit">Created by Guilherme Fernandes</p>
    </section>
  </main>

  <div id="confirmDialog" class="dialog-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <div class="dialog-card">
      <h3 id="confirmTitle">Confirmar ação</h3>
      <p id="confirmMessage">Tem certeza?</p>
      <div class="dialog-actions">
        <button id="confirmCancel" class="dialog-cancel" type="button">Cancelar</button>
        <button id="confirmAccept" class="dialog-accept" type="button">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
