<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>TimeFlow</h1>
      <p>Monitore seu foco com multiplos cronometros</p>
    </header>

    <section class="create-area">
      <input type="text" id="name" placeholder="Nome do cronometro">
      <button id="create">Criar</button>
    </section>

    <section class="timers-wrap">
      <h2>Cronometros</h2>
      <div id="timers"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
